name: Validate Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout templates
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache fledge build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge
            ~/.cargo/registry
            ~/.cargo/git
          key: fledge-${{ hashFiles('.github/workflows/validate.yml') }}

      - name: Install fledge
        run: |
          if ! fledge validate-template --help &> /dev/null 2>&1; then
            cargo install --git https://github.com/CorvidLabs/fledge.git --branch main --force
          fi

      - name: Validate all templates
        run: |
          for dir in */; do
            if [ -f "$dir/template.toml" ]; then
              echo "Validating $dir..."
              fledge validate-template "$dir" --strict
            fi
          done
